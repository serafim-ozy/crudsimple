# =========================================================
# Aplicacao
# =========================================================
spring.application.name=exemplopers
server.port=8080

# =========================================================
# Conexao com o MySQL/MariaDB do XAMPP
# (No XAMPP, por padrao: usuario "root" sem senha, porta 3306)
# Crie o banco antes: CREATE DATABASE cinema_db;
# =========================================================
spring.datasource.url=jdbc:mysql://localhost:3306/cinema_db?useSSL=false&serverTimezone=America/Sao_Paulo&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================================
# JPA / Hibernate
# =========================================================
# "update" gera o schema a partir das entidades.
# Para producao use "validate" ou "none" e versione com Flyway/Liquibase.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Evita o "open-in-view" (anti-pattern) - mantem transacoes contidas na service.
spring.jpa.open-in-view=false

